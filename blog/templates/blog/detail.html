{% extends "portfolio/base.html" %}

{% load static %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-8">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-5">
        <small class="text-muted">{{ blog.date|date:'F jS, Y' }}</small>
        <h1 class="fw-bold mt-2 mb-4">{{ blog.title }}</h1>
        <hr class="mb-4">
        <div class="blog-content">
          {{ blog.description|safe }}
        </div>
        <hr class="mt-5 mb-3">
        <a href="{% url 'blog:all_blogs' %}" class="btn btn-outline-dark btn-sm">← Back to blog</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
