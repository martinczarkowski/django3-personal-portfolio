{% extends "portfolio/base.html" %}

{% load static %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h2 class="fw-bold mb-4 section-title">{{ t.gen_your_password }}</h2>

        <div class="rounded p-3 mb-4 d-flex align-items-center justify-content-between" style="background: var(--surface); border: 1px solid var(--border);">
          <code id="passwordText" class="fs-4">{{ password }}</code>
          <button id="copyBtn" class="btn btn-outline-dark btn-sm ms-3" onclick="copyPassword()">
            {{ t.gen_copy }}
          </button>
        </div>

        <div class="d-flex gap-2 justify-content-center">
          <button class="btn btn-dark" onclick="window.location.reload()">{{ t.gen_regenerate }}</button>
          <a href="{% url 'generator' %}" class="btn btn-outline-dark">{{ t.gen_settings }}</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function copyPassword() {
    navigator.clipboard.writeText(document.getElementById('passwordText').textContent.trim());
    const btn = document.getElementById('copyBtn');
    btn.classList.remove('btn-outline-dark');
    btn.classList.add('btn-success');
    btn.textContent = '{{ t.gen_copied }}';
  }
</script>

{% endblock %}
