{% extends "portfolio/base.html" %}

{% load static %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 text-center">
        <h2 class="fw-bold mb-4">Your password</h2>

        <div class="bg-light rounded p-3 mb-4 d-flex align-items-center justify-content-between">
          <code id="passwordText" class="fs-4 text-dark">{{ password }}</code>
          <button id="copyBtn" class="btn btn-outline-secondary btn-sm ms-3" onclick="copyPassword()">
            Copy
          </button>
        </div>

        <div class="d-flex gap-2 justify-content-center">
          <button class="btn btn-dark" onclick="window.location.reload()">Regenerate</button>
          <a href="{% url 'generator' %}" class="btn btn-outline-dark">Change settings</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function copyPassword() {
    navigator.clipboard.writeText(document.getElementById('passwordText').textContent.trim());
    const btn = document.getElementById('copyBtn');
    btn.classList.remove('btn-outline-secondary');
    btn.classList.add('btn-warning');
    btn.textContent = 'Copied!';
  }
</script>

{% endblock %}
