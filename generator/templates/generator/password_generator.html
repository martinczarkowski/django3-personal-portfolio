{% extends "portfolio/base.html" %}

{% load static %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="fw-bold mb-4 text-center section-title">{{ t.gen_title }}</h2>

        <form action="{% url 'password' %}">
          <div class="mb-4">
            <label class="form-label fw-semibold">{{ t.gen_length }}: <span id="lengthVal">12</span></label>
            <input type="range" class="form-range" name="length" min="6" max="32" value="12"
              oninput="document.getElementById('lengthVal').textContent = this.value">
          </div>

          <div class="mb-4">
            <div class="form-check form-switch mb-2">
              <input class="form-check-input" type="checkbox" name="uppercase" id="uppercase">
              <label class="form-check-label" for="uppercase">{{ t.gen_uppercase }}</label>
            </div>
            <div class="form-check form-switch mb-2">
              <input class="form-check-input" type="checkbox" name="numbers" id="numbers">
              <label class="form-check-label" for="numbers">{{ t.gen_numbers }}</label>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="special" id="special">
              <label class="form-check-label" for="special">{{ t.gen_special }}</label>
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-dark btn-lg">{{ t.gen_generate }}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
