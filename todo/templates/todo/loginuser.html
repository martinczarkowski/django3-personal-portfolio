{% extends "todo/base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body p-4">
        <h2 class="fw-bold mb-1">{{ t.login_title }}</h2>
        <p class="text-muted mb-4">{{ t.login_subtitle }}</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">{{ t.login_username }}</label>
            <input type="text" name="username" class="form-control" id="username" autofocus>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">{{ t.login_password }}</label>
            <input type="password" name="password" class="form-control" id="password">
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-dark fw-semibold">{{ t.login_btn }}</button>
          </div>
        </form>

        <hr>
        <p class="text-center text-muted mb-0 small">{{ t.login_no_account }} <a href="{% url 'signupuser' %}">{{ t.login_signup_link }}</a></p>
      </div>
    </div>
  </div>
</div>

{% endblock %}
