{% extends "todo/base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h2 class="fw-bold mb-1">New todo 📝</h2>
        <p class="text-muted mb-4">What do you need to get done?</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control" id="title" autofocus required>
          </div>
          <div class="mb-3">
            <label for="memo" class="form-label fw-semibold">Memo <span class="text-muted fw-normal">(optional)</span></label>
            <textarea name="memo" class="form-control" id="memo" rows="3"></textarea>
          </div>
          <div class="form-check form-switch mb-4">
            <input type="checkbox" name="important" class="form-check-input" id="important">
            <label class="form-check-label fw-semibold" for="important">Mark as important</label>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning fw-semibold">Save</button>
            <a href="{% url 'currenttodos' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
