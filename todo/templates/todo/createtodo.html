{% extends "todo/base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body p-4">
        <h2 class="fw-bold mb-1">{{ t.todo_create_title }}</h2>
        <p class="text-muted mb-4">{{ t.todo_create_subtitle }}</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">{{ t.todo_title_label }}</label>
            <input type="text" name="title" class="form-control" id="title" autofocus required>
          </div>
          <div class="mb-3">
            <label for="memo" class="form-label fw-semibold">{{ t.todo_memo_label }} <span class="text-muted fw-normal">{{ t.todo_optional }}</span></label>
            <textarea name="memo" class="form-control" id="memo" rows="3"></textarea>
          </div>
          <div class="form-check form-switch mb-4">
            <input type="checkbox" name="important" class="form-check-input" id="important">
            <label class="form-check-label fw-semibold" for="important">{{ t.todo_important }}</label>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark fw-semibold">{{ t.todo_save }}</button>
            <a href="{% url 'currenttodos' %}" class="btn btn-outline-dark">{{ t.todo_cancel }}</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
