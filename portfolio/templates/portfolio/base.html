{% load static %}
<!doctype html>
<html lang="{{ lang }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static "portfolio/custom.css" %}">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{% static "portfolio/Logo.svg" %}">
  <title>Martin Czarkowski</title>
</head>

<body class="d-flex flex-column min-vh-100">

  <nav id="topNav" class="navbar navbar-expand-md navbar-light">
    <div class="container">
      <a class="navbar-brand brand-terminal" href="{% url 'home' %}">
        <span class="brand-prefix">&gt;_</span> martin-czarkowski
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link" href="https://www.linkedin.com/in/martin-czarkowski-4252828b/" target="_blank">LinkedIn</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://github.com/martinczarkowski" target="_blank">GitHub</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'contact' %}">{{ t.nav_contact }}</a>
          </li>
          <li class="nav-item me-2">
            <a role="button" href="{% url 'blog:all_blogs' %}" class="btn btn-primary btn-sm">{{ t.nav_blog }}</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'set_language' %}?lang={% if lang == 'en' %}cs{% else %}en{% endif %}"
               class="btn btn-outline-dark btn-sm" title="{{ t.lang_switch_title }}">
              {{ t.lang_switch }}
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container flex-grow-1">
    {% block content %}{% endblock %}
  </div>

  <footer class="footer mt-auto py-3 text-center">
    <div class="container">
      <p class="mb-0">{{ t.footer_made }}</p>
      <span class="text-muted">{{ t.footer_copy }}</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmzXHjHSCKDSWIH0IzQ/ZiZIFMfK" crossorigin="anonymous"></script>
</body>

</html>
